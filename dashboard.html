<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🪵 Dashboard Hecho por Lili - Agente WhatsApp</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #f5f5f0 0%, #ede7df 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .header {
            max-width: 1200px;
            margin: 0 auto 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 28px;
            color: #3d3d3d;
            margin-bottom: 10px;
        }
        
        .header p {
            color: #666;
            font-size: 14px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            border-left: 4px solid #8B7355;
        }
        
        .stat-card.hot {
            border-left-color: #e74c3c;
        }
        
        .stat-card.warm {
            border-left-color: #f39c12;
        }
        
        .stat-card.cold {
            border-left-color: #95a5a6;
        }
        
        .stat-label {
            font-size: 12px;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        
        .stat-number {
            font-size: 32px;
            font-weight: 700;
            color: #3d3d3d;
        }
        
        .leads-section {
            margin-top: 40px;
        }
        
        .leads-section h2 {
            font-size: 20px;
            color: #3d3d3d;
            margin-bottom: 20px;
        }
        
        .leads-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }
        
        .lead-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            border-top: 3px solid #8B7355;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .lead-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(0,0,0,0.12);
        }
        
        .lead-card.hot {
            border-top-color: #e74c3c;
        }
        
        .lead-card.warm {
            border-top-color: #f39c12;
        }
        
        .lead-card.cold {
            border-top-color: #95a5a6;
        }
        
        .lead-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 15px;
        }
        
        .lead-phone {
            font-weight: 600;
            color: #3d3d3d;
            font-size: 14px;
        }
        
        .lead-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .badge-hot {
            background: #fee;
            color: #e74c3c;
        }
        
        .badge-warm {
            background: #fef5e7;
            color: #f39c12;
        }
        
        .badge-cold {
            background: #ecf0f1;
            color: #7f8c8d;
        }
        
        .lead-info {
            margin-bottom: 12px;
            font-size: 13px;
            color: #666;
        }
        
        .lead-info strong {
            color: #3d3d3d;
        }
        
        .lead-messages {
            background: #f9f9f9;
            border-radius: 8px;
            padding: 12px;
            margin-top: 15px;
            font-size: 12px;
            max-height: 120px;
            overflow-y: auto;
            color: #555;
        }
        
        .message {
            margin-bottom: 8px;
            padding-bottom: 8px;
            border-bottom: 1px solid #eee;
        }
        
        .message:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }
        
        .message.user {
            font-weight: 500;
            color: #3d3d3d;
        }
        
        .message.bot {
            color: #888;
            font-style: italic;
        }
        
        .lead-actions {
            margin-top: 15px;
            display: flex;
            gap: 10px;
        }
        
        .btn {
            flex: 1;
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-primary {
            background: #8B7355;
            color: white;
        }
        
        .btn-primary:hover {
            background: #6f5a44;
        }
        
        .btn-secondary {
            background: #ecf0f1;
            color: #3d3d3d;
        }
        
        .btn-secondary:hover {
            background: #d5dbdb;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
            font-size: 14px;
        }
        
        .empty {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }
        
        .empty h3 {
            font-size: 18px;
            margin-bottom: 10px;
            color: #666;
        }
        
        .footer {
            text-align: center;
            padding: 20px;
            color: #999;
            font-size: 12px;
            margin-top: 40px;
        }
        
        @media (max-width: 768px) {
            .stats {
                grid-template-columns: 1fr;
            }
            
            .leads-grid {
                grid-template-columns: 1fr;
            }
            
            .header h1 {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🪵 Hecho por Lili - Dashboard de Leads</h1>
        <p>Monitoreo de conversaciones WhatsApp en tiempo real</p>
    </div>
    
    <div class="container">
        <!-- Stats -->
        <div class="stats">
            <div class="stat-card hot">
                <div class="stat-label">🔥 Calientes</div>
                <div class="stat-number" id="hot-count">0</div>
            </div>
            <div class="stat-card warm">
                <div class="stat-label">🟡 Tibios</div>
                <div class="stat-number" id="warm-count">0</div>
            </div>
            <div class="stat-card cold">
                <div class="stat-label">❄️ Fríos</div>
                <div class="stat-number" id="cold-count">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">📱 Total</div>
                <div class="stat-number" id="total-count">0</div>
            </div>
        </div>
        
        <!-- Leads -->
        <div class="leads-section">
            <h2>Conversaciones Activas</h2>
            <div id="leads-container" class="leads-grid">
                <div class="loading">Cargando leads...</div>
            </div>
        </div>
    </div>
    
    <div class="footer">
        <p>Auto-actualiza cada 5 segundos | Última actualización: <span id="last-update">-</span></p>
    </div>
    
    <script>
        async function loadLeads() {
            try {
                const response = await fetch('/leads');
                const data = await response.json();
                
                // Actualizar stats
                document.getElementById('hot-count').textContent = data.calientes || 0;
                document.getElementById('warm-count').textContent = data.tibios || 0;
                document.getElementById('cold-count').textContent = data.frios || 0;
                document.getElementById('total-count').textContent = data.total_leads || 0;
                document.getElementById('last-update').textContent = new Date().toLocaleTimeString('es-ES');
                
                // Mostrar leads
                const container = document.getElementById('leads-container');
                
                if (!data.leads || data.leads.length === 0) {
                    container.innerHTML = `
                        <div style="grid-column: 1/-1; text-align: center; padding: 60px 20px; color: #999;">
                            <h3>No hay leads aún</h3>
                            <p>Los leads aparecerán aquí cuando comiencen a escribir</p>
                        </div>
                    `;
                    return;
                }
                
                container.innerHTML = data.leads.map(lead => {
                    const temperatura = lead.temperatura || 'frio';
                    const producto = lead.producto || 'No especificado';
                    const etapa = lead.etapa || 'inicial';
                    const ultimoMensaje = lead.ultimos_mensajes ? lead.ultimos_mensajes[lead.ultimos_mensajes.length - 1] : 'Sin mensajes';
                    
                    return `
                        <div class="lead-card ${temperatura}">
                            <div class="lead-header">
                                <div class="lead-phone">📱 ${lead.telefono}</div>
                                <span class="lead-badge badge-${temperatura}">${temperatura}</span>
                            </div>
                            
                            <div class="lead-info">
                                <strong>Producto:</strong> ${producto}
                            </div>
                            <div class="lead-info">
                                <strong>Etapa:</strong> ${etapa}
                            </div>
                            <div class="lead-info">
                                <strong>Primer contacto:</strong> ${new Date(lead.primer_contacto).toLocaleDateString('es-ES')}
                            </div>
                            
                            <div class="lead-messages">
                                <div class="message user">${ultimoMensaje}</div>
                            </div>
                            
                            <div class="lead-actions">
                                <button class="btn btn-primary" onclick="openLead('${lead.telefono}')">Ver conversa</button>
                                <button class="btn btn-secondary" onclick="contact('${lead.telefono}')">Contactar</button>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (error) {
                console.error('Error cargando leads:', error);
                document.getElementById('leads-container').innerHTML = `
                    <div style="grid-column: 1/-1; padding: 40px; text-align: center; color: #e74c3c;">
                        <p>⚠️ Error conectando al servidor</p>
                        <p style="font-size: 12px; margin-top: 10px;">Verifica que el agente esté corriendo</p>
                    </div>
                `;
            }
        }
        
        function openLead(phone) {
            window.location.href = `/leads/${phone}`;
        }
        
        function contact(phone) {
            const whatsappUrl = `https://wa.me/${phone}`;
            window.open(whatsappUrl, '_blank');
        }
        
        // Cargar al inicio
        loadLeads();
        
        // Auto-actualizar cada 5 segundos
        setInterval(loadLeads, 5000);
    </script>
</body>
</html>
